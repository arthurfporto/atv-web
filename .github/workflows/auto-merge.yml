name: Auto-Merge se Testes Passaram

on:
  workflow_run:
    workflows: ["Verificar Atividade do Aluno"]
    types: [completed]

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Buscar número do PR associado ao commit
        id: find-pr
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.payload.workflow_run.head_sha;
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
            });

            const pr = prs.find(p => p.head.sha === sha);
            if (!pr) {
              core.setFailed('Nenhum PR aberto encontrado para esse commit.');
              return;
            }

            core.setOutput('pr_number', pr.number);
            console.log(`PR encontrado: #${pr.number}`);

      - name: Fazer merge automático do PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = parseInt('${{ steps.find-pr.outputs.pr_number }}');

            await github.rest.pulls.merge({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              merge_method: 'squash',
              commit_title: `✅ Atividade aprovada - PR #${prNumber}`,
            });

            console.log(`✅ PR #${prNumber} mergeado com sucesso!`);

      - name: Comentar no PR com resultado
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = parseInt('${{ steps.find-pr.outputs.pr_number }}');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: `🎉 **Atividade aprovada e mergeada automaticamente!**\n\nTodos os critérios foram atendidos:\n- ✅ Um único arquivo enviado\n- ✅ Arquivo é \`index.html\`\n- ✅ Estrutura HTML básica correta\n- ✅ Tag \`<h1>\` presente e válida no \`<body>\``,
            });
